name: Incredibuild Industry Research

on:
  schedule:
    # 周一、三、五、日 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * 1,3,5,0'
  workflow_dispatch:

env:
  RAW_DIR: raw_sources
  MEMORY_DIR: memory
  REPORT_DIR: reports
  # Obsidian 目标路径
  OBSIDIAN_REPO: QPZzzzzz/obsidian-data
  OBSIDIAN_TARGET_DIR: 行业信息/incredibuild

jobs:
  # ═══════════════════════════════════════════════════════════
  # Phase 1: 多轮搜索 + 结构化采集
  # ═══════════════════════════════════════════════════════════
  collect:
    name: Collect sources
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Phase 1 - Multi-source search & analysis
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/research.py phase1

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: raw_sources/

  # ═══════════════════════════════════════════════════════════
  # Phase 2: 报告生成
  # ═══════════════════════════════════════════════════════════
  generate:
    name: Generate report
    needs: collect
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Download raw data
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: raw_sources/

      - name: Phase 2 - Generate report & memory
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/research.py phase2

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/

  # ═══════════════════════════════════════════════════════════
  # 推送报告到 Obsidian
  # ═══════════════════════════════════════════════════════════
  push:
    name: Sync to Obsidian
    needs: generate
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: report
          path: reports/

      - name: Push to Obsidian vault
        run: |
          DATE=$(date +%Y-%m-%d)

          # Clone Obsidian 私有仓库
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.OBSIDIAN_REPO }}.git obsidian-vault

          # 创建目标目录：行业信息/incredibuild/
          TARGET="obsidian-vault/${{ env.OBSIDIAN_TARGET_DIR }}"
          mkdir -p "$TARGET"

          # 复制报告文件
          for f in reports/*.md; do
            [ ! -f "$f" ] && continue
            cp "$f" "$TARGET/"
            echo "  📄 $(basename "$f")"
          done

          # 更新目录索引 (README)
          INDEX="$TARGET/README.md"
          {
            echo "# Incredibuild 行业调研"
            echo ""
            echo "自动更新于 $(date '+%Y-%m-%d %H:%M')"
            echo "调度频率: 周一/三/五/日"
            echo ""
            echo "## 报告列表"
            echo ""
            for f in "$TARGET"/*.md; do
              b=$(basename "$f")
              [ "$b" != "README.md" ] && echo "- [${b%.md}]($b)"
            done
          } > "$INDEX"

          # Commit & push
          cd obsidian-vault
          git config user.name "weekly-research-bot"
          git config user.email "bot@weekly-research"
          git add "${{ env.OBSIDIAN_TARGET_DIR }}/"
          if git diff --cached --quiet; then
            echo "ℹ️ 没有新内容需要同步"
          else
            git commit -m "incredibuild: ${DATE} 行业调研报告"
            git push
            echo "✅ 已同步到 Obsidian: ${{ env.OBSIDIAN_TARGET_DIR }}/"
          fi
